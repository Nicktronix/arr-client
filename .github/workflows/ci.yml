name: Flutter CI/CD

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.github/dependabot.yml'
      - '.gitignore'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.github/dependabot.yml'
      - '.gitignore'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Code Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib/ test/
      
      - name: Analyze code
        run: flutter analyze --no-fatal-infos

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: analyze
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Run tests with coverage
        run: flutter test --coverage --reporter=expanded

      - name: Check coverage threshold
        run: |
          COVERAGE=$(awk -F: '/^DA:/{split($2,a,","); total++; if(a[2]>0) hit++} END{printf "%.0f", hit/total*100}' coverage/lcov.info)
          echo "Line coverage: ${COVERAGE}%"
          if [ "$COVERAGE" -lt 10 ]; then
            echo "Coverage ${COVERAGE}% is below minimum threshold of 10%"
            exit 1
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: analyze

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run OSV Scanner
        uses: google/osv-scanner-action@v2.3.5
        with:
          scan-args: |-
            --lockfile=pubspec.lock

